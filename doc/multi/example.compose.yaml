x-build-common: &build-common
  context: .
  target: final

# Example fleet of three Pillbug agents — different models, different jobs,
# different channels — plus the operator dashboard, a Gemini→OpenAI proxy
# fronting a local model for the cron-worker, and a Redis used by Docket for
# scheduled tasks.
#
# Service names match the README "Example fleet" snippet:
#   generalist   — Gemini Pro, Matrix + A2A
#   cron-worker  — local model via genai-proxy, A2A + HTTP trigger + bundled memory
#   assistant    — Gemini Flash, Telegram + A2A
#
# arca-memory and the alerts companion service are intentionally omitted from
# the default stack. Uncomment the optional arca-memory block at the bottom if
# you want a graph + semantic memory MCP shared across runtimes (see
# doc/INSTALL.md → Memory).

services:
  generalist:
    build:
      <<: *build-common
      args:
        PILLBUG_INSTALL_EXTRAS: a2a,matrix
        EXTRA_PACKAGES: ca-certificates curl jq
    container_name: generalist
    hostname: generalist
    env_file:
      - ./example_generalist.env
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    volumes:
      - type: bind
        source: ~/.pillbug/generalist
        target: /home/pillbug
    # Skill secrets — uncomment alongside the top-level `secrets:` block below.
    # secrets:
    #   - tavily_api_key
    #   - elevenlabs_api_key

  cron-worker:
    build:
      <<: *build-common
      args:
        PILLBUG_INSTALL_EXTRAS: a2a,trigger,memory
        EXTRA_PACKAGES: ca-certificates curl jq
    container_name: cron-worker
    hostname: cron-worker
    depends_on:
      - genai-proxy
      - redis
    env_file:
      - ./example_cron-worker.env
    ports:
      - "8002:8000"
      - "9100:9100"   # trigger ingress
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    volumes:
      - type: bind
        source: ~/.pillbug/cron-worker
        target: /home/pillbug

  genai-proxy:
    build:
      <<: *build-common
      args:
        PILLBUG_INSTALL_EXTRAS: genai_proxy
    container_name: genai-proxy
    hostname: genai-proxy
    env_file:
      - ./example_genai-proxy.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    command:
      - uv
      - run
      - pillbug-genai-proxy

  assistant:
    build:
      <<: *build-common
      args:
        PILLBUG_INSTALL_EXTRAS: a2a,telegram
        EXTRA_PACKAGES: ca-certificates curl jq
    container_name: assistant
    hostname: assistant
    env_file:
      - ./example_assistant.env
    ports:
      - "8003:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    volumes:
      - type: bind
        source: ~/.pillbug/assistant
        target: /home/pillbug

  dashboard:
    build:
      <<: *build-common
      args:
        PILLBUG_INSTALL_EXTRAS: dashboard
    container_name: dashboard
    hostname: dashboard
    depends_on:
      - generalist
      - cron-worker
      - assistant
    env_file:
      - ./example_dashboard.env
    ports:
      - "8010:8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    command:
      - uv
      - run
      - pillbug-dashboard
    volumes:
      - type: bind
        source: ~/.pillbug/dashboard
        target: /home/pillbug

  redis:
    image: redis:7
    container_name: redis
    hostname: redis
    ports:
      - "6379:6379"
    restart: on-failure:5
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  # Optional: shared memory MCP service. Requires building the arca-memory image
  # locally first (see doc/INSTALL.md → Multi-runtime → Step 2). Uncomment, then
  # point each runtime at it through workspace/mcp.json.
  # arca-memory:
  #   image: arca-memory:latest
  #   container_name: arca-memory
  #   hostname: arca-memory
  #   ports:
  #     - "8201:8201"
  #   env_file:
  #     - ./example_arca.env
  #   restart: on-failure:5
  #   volumes:
  #     - type: bind
  #       source: ~/.arca-memory
  #       target: /var/lib/arca-memory

# Skill secrets — uncomment and create the files (see doc/INSTALL.md → Skill Secrets),
# then add a matching `secrets:` list to each service that runs those skills.
# secrets:
#   tavily_api_key:
#     file: ./secrets/tavily_api_key
#   elevenlabs_api_key:
#     file: ./secrets/elevenlabs_api_key
