[project]
name = "pillbug-slack"
version = "0.1.0"
description = "Slack channel plugin for Pillbug (Socket Mode)"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pillbug",
    "slack-sdk>=3.27.0",
    "aiohttp>=3.13.3",
]

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
pillbug = { workspace = true }

[tool.uv.build-backend]
module-name = "pillbug_slack"
module-root = "src"
