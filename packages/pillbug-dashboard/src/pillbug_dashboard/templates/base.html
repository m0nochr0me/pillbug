<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <link rel="preload" href="{{ url_for('static', path='/font/DepartureMono-Regular.woff2') }}" as="font" type="font/woff2" crossorigin>
    <link href="{{ url_for('static', path='/css/app.css') }}" rel="stylesheet">
    <script defer src="{{ url_for('static', path='/js/vendor/vue.global.js') }}"></script>
    {% block head %}{% endblock %}
    <title>{{ page_title }} | Pillbug</title>
  </head>
  <body class="shell">
    <header class="header">
      <div class="container header-inner">
        <a href="/runtimes" class="brand">
          <span class="brand-mark">PB</span>
          <span>
            <strong>Pillbug</strong>
          </span>
        </a>
        <div class="nav-spacer"></div>
        <a href="/runtimes" class="nav-link">Runtimes</a>
      </div>
    </header>
    <main class="container main">
      {% block content %}{% endblock %}
    </main>
    <div id="confirm-overlay" class="overlay"></div>
    <dialog id="confirm-dialog">
      <div class="stack gap-3">
        <p class="eyebrow">CONFIRM</p>
        <h5 id="confirm-title">Confirm action</h5>
        <p id="confirm-message" class="muted"></p>
        <div class="row right gap-2">
          <button id="confirm-cancel" type="button" class="ghost">Cancel</button>
          <button id="confirm-submit" type="button" class="ghost">Confirm</button>
        </div>
      </div>
    </dialog>
    <script defer src="{{ url_for('static', path='/js/app/confirm-dialog.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
