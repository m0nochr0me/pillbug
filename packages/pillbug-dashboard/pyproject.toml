[project]
name = "pillbug-dashboard"
version = "0.1.0"
description = "Operator dashboard for Pillbug runtimes"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.135.1",
    "httpx>=0.28.1",
    "jinja2>=3.1.6",
    "pydantic>=2.0",
    "pydantic-settings>=2.11.0",
    "uvicorn>=0.35.0",
]

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "pillbug_dashboard"
module-root = "src"

[project.scripts]
pillbug-dashboard = "pillbug_dashboard.__main__:entrypoint"
