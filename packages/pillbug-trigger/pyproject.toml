[project]
name = "pillbug-trigger"
version = "0.1.0"
description = "External event trigger channel plugin for Pillbug with urgency-based debounce"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pillbug",
    "pydantic-settings>=2.11.0",
]

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
pillbug = { workspace = true }

[tool.uv.build-backend]
module-name = "pillbug_trigger"
module-root = "src"
