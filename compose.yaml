x-build-common: &build-common
  context: .
  target: final

services:
  pillbug-a:
    build:
      <<: *build-common
      args:
        PILLBUG_INSTALL_EXTRAS: a2a,telegram,trigger
        EXTRA_PACKAGES: ca-certificates curl jq
    container_name: pillbug-a
    hostname: pillbug-a
    env_file:
      - ./deploy/runtime-a.env
    ports:
      - "8001:8000"
      - "9101:9100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    volumes:
      - type: bind
        source: /opt/ext/pillbug/runtime-a
        target: /var/lib/pillbug

  pillbug-b:
    build:
      <<: *build-common
      args:
        PILLBUG_INSTALL_EXTRAS: a2a
        EXTRA_PACKAGES: ca-certificates curl jq
    container_name: pillbug-b
    hostname: pillbug-b
    dns: # Adguard DNS servers
      - 94.140.14.140
      - 94.140.15.15
    env_file:
      - ./deploy/runtime-b.env
    ports:
      - "8002:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    volumes:
      - type: bind
        source: /opt/ext/pillbug/runtime-b
        target: /var/lib/pillbug

  pillbug-c:
    build:
      <<: *build-common
      args:
        PILLBUG_INSTALL_EXTRAS: telegram
        EXTRA_PACKAGES: ca-certificates curl jq
    container_name: pillbug-c
    hostname: pillbug-c
    dns: # Adguard DNS servers
      - 94.140.14.140
      - 94.140.15.15
    env_file:
      - ./deploy/runtime-c.env
    ports:
      - "8003:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    volumes:
      - type: bind
        source: /opt/ext/pillbug/runtime-c
        target: /var/lib/pillbug

  pillbug-alerts:
    build:
      context: ./app/scratch/alerts
      dockerfile: Dockerfile.alerts
    container_name: pillbug-alerts
    hostname: pillbug-alerts
    depends_on:
      - pillbug-a
    env_file:
      - ./deploy/alerts.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    volumes:
      - type: volume
        source: pillbug-alerts-state
        target: /home/pillbug/state

  pillbug-dashboard:
    build:
      <<: *build-common
      args:
        PILLBUG_INSTALL_EXTRAS: dashboard
    container_name: pillbug-dashboard
    hostname: pillbug-dashboard
    depends_on:
      - pillbug-a
      - pillbug-b
      - pillbug-c
    env_file:
      - ./deploy/dashboard.env
    ports:
      - "8010:8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    command:
      - uv
      - run
      - pillbug-dashboard
    volumes:
      - type: bind
        source: /opt/ext/pillbug/dashboard
        target: /var/lib/pillbug-dashboard

volumes:
  pillbug-alerts-state:
