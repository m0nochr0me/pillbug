services:
  pillbug-a:
    build:
      context: .
      args:
        PILLBUG_INSTALL_EXTRAS: a2a,telegram
    container_name: pillbug-a
    hostname: pillbug-a
    env_file:
      - ./deploy/runtime-a.env
    user: "1000:1000"
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    volumes:
      - type: bind
        source: /opt/ext/pillbug/runtime-a
        target: /var/lib/pillbug

  pillbug-b:
    build:
      context: .
      args:
        PILLBUG_INSTALL_EXTRAS: a2a
    container_name: pillbug-b
    hostname: pillbug-b
    env_file:
      - ./deploy/runtime-b.env
    user: "1000:1000"
    ports:
      - "8002:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure:5
    volumes:
      - type: bind
        source: /opt/ext/pillbug/runtime-b
        target: /var/lib/pillbug
